<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The First Six Weeks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..900,0..100,0..1;1,9..144,400..900,0..100,0..1&family=Inter:wght@400;500;600&display=swap');
@page { size: 1600px 2560px; margin: 0; background: #EAEEE2; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1600px; height: 2560px; background: #EAEEE2; color: #2E2A24; font-family: 'Inter', sans-serif; }
.cover { width: 1600px; height: 2560px; padding: 200px 180px 220px 180px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }
.sprig { margin-top: 40px; width: 220px; height: 240px; }
.imprint-plate { margin-top: 220px; letter-spacing: 0.32em; font-size: 32px; font-weight: 500; color: #B8AC9A; text-transform: uppercase; }
.title { margin-top: 220px; font-family: 'Caveat', cursive; font-weight: 600; font-size: 220px; line-height: 1.0; color: #8C9B7A; letter-spacing: -0.5px; }
.subtitle { margin-top: 120px; font-family: 'Fraunces', serif; font-style: italic; font-variation-settings: 'opsz' 30; font-weight: 400; font-size: 52px; line-height: 1.3; color: #5C5347; max-width: 1100px; }
.divider { margin-top: 150px; width: 240px; height: 4px; background: #A8B894; border-radius: 2px; }
.foot { position: absolute; bottom: 200px; left: 0; right: 0; text-align: center; display: flex; flex-direction: column; align-items: center; }
.foot-soothemade { font-family: 'Caveat', cursive; font-weight: 600; font-size: 88px; color: #2E2A24; }
.foot-tag { margin-top: 18px; font-family: 'Inter', sans-serif; font-size: 22px; letter-spacing: 0.35em; text-transform: uppercase; color: #B8AC9A; }
</style>
</head>
<body>
<div class="cover">
  <svg class="sprig" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
    <path d="M100,210 L100,40" stroke="#8C9B7A" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="100" cy="36" rx="14" ry="40" fill="#8C9B7A"/>
    <ellipse cx="62" cy="118" rx="44" ry="20" fill="#8C9B7A" transform="rotate(-30 62 118)"/>
    <ellipse cx="138" cy="80" rx="44" ry="20" fill="#8C9B7A" transform="rotate(35 138 80)"/>
  </svg>
  <div class="imprint-plate">A Soothemade Book</div>
  <h1 class="title">The First<br>Six Weeks</h1>
  <p class="subtitle">A newborn survival book, week by week.</p>
  <div class="divider"></div>
  <div class="foot">
    <span class="foot-soothemade">Soothemade</span>
    <div class="foot-tag">A Small Apothecary · Made Slowly</div>
  </div>
</div>
</body>
</html>
