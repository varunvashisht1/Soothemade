# Cloudflare Workers configuration for soothemade.com (umbrella site)
# Deploy with: npm run deploy
# Full deploy guide: ./DEPLOY.md
#
# The umbrella site is intentionally read-only: no D1, no R2, no KV, no
# Vectorize, no AI. Newsletter signups POST to a sub-line endpoint or a
# future shared service — not handled here.

name = "soothemade-main"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

main = "./dist/_worker.js/index.js"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true

# ---------------------------------------------------------------
# Custom domain — attached via the CF dashboard
# (Workers > soothemade-main > Settings > Domains & Routes).
# Apex domain soothemade.com + www.soothemade.com both point here.
# Do not uncomment this block without coordinating with the dashboard.
# ---------------------------------------------------------------
# routes = [
#   { pattern = "soothemade.com", custom_domain = true },
#   { pattern = "www.soothemade.com", custom_domain = true }
# ]
